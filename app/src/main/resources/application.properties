spring.application.name=app

# -------------------------
# OpenAI Configuration
# -------------------------
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# -------------------------
# Qdrant Vector Store Config
# -------------------------
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=enterprise_knowledge
# Automatically creates the collection if it doesn't exist
spring.ai.vectorstore.qdrant.initialize-schema=false

# Keep your core app logging informative while silencing library-specific noise
logging.level.org.apache.pdfbox=WARN
logging.level.org.apache.fontbox=OFF
